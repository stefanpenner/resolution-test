name: Deep Composite Resolution Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # Baseline: runs on stock runner (main branch, no batching)
  resolve-storm-main:
    runs-on: [self-hosted-main]
    steps:
      - uses: actions/checkout@v4
      - uses: stefanpenner/resolution-test/leaf-echo@main
        with:
          message: 'top-level leaf-echo (main runner)'
      - uses: stefanpenner/resolution-test/composite-a@main
      - uses: stefanpenner/resolution-test/composite-b@main
      - uses: stefanpenner/resolution-test/composite-c@main
      - run: echo "All composites resolved and executed successfully (main runner)"
        shell: bash

  # Optimized: runs on PR runner (batched resolution)
  resolve-storm-pr:
    runs-on: [self-hosted-pr]
    steps:
      - uses: actions/checkout@v4
      - uses: stefanpenner/resolution-test/leaf-echo@main
        with:
          message: 'top-level leaf-echo (PR runner)'
      - uses: stefanpenner/resolution-test/composite-a@main
      - uses: stefanpenner/resolution-test/composite-b@main
      - uses: stefanpenner/resolution-test/composite-c@main
      - run: echo "All composites resolved and executed successfully (PR runner)"
        shell: bash

  # Also keep a GitHub-hosted run for reference
  resolve-storm-hosted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: stefanpenner/resolution-test/leaf-echo@main
        with:
          message: 'top-level leaf-echo (hosted)'
      - uses: stefanpenner/resolution-test/composite-a@main
      - uses: stefanpenner/resolution-test/composite-b@main
      - uses: stefanpenner/resolution-test/composite-c@main
      - run: echo "All composites resolved and executed successfully (hosted)"
        shell: bash
