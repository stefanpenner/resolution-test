name: Deep Composite Resolution Test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # Baseline: runs on stock runner (main branch, no batching)
  # Expected: ~301 resolve API calls
  resolve-storm-main:
    runs-on: [self-hosted-main]
    steps:
      - uses: actions/checkout@v4
      - uses: stefanpenner/resolution-test/L1-01@main
      - uses: stefanpenner/resolution-test/L1-02@main
      - uses: stefanpenner/resolution-test/L1-03@main
      - uses: stefanpenner/resolution-test/L1-04@main
      - uses: stefanpenner/resolution-test/L1-05@main
      - uses: stefanpenner/resolution-test/L1-06@main
      - uses: stefanpenner/resolution-test/L1-07@main
      - uses: stefanpenner/resolution-test/L1-08@main
      - uses: stefanpenner/resolution-test/L1-09@main
      - uses: stefanpenner/resolution-test/L1-10@main
      - uses: stefanpenner/resolution-test/leaf-01@main
      - uses: stefanpenner/resolution-test/leaf-02@main
      - uses: stefanpenner/resolution-test/leaf-03@main
      - uses: stefanpenner/resolution-test/leaf-04@main
      - uses: stefanpenner/resolution-test/leaf-05@main
      - run: echo "Done (main runner - stock, ~301 resolve calls expected)"
        shell: bash

  # Optimized: runs on PR runner (batched + deduped resolution)
  # Expected: ~4 resolve API calls
  resolve-storm-pr:
    runs-on: [self-hosted-pr]
    steps:
      - uses: actions/checkout@v4
      - uses: stefanpenner/resolution-test/L1-01@main
      - uses: stefanpenner/resolution-test/L1-02@main
      - uses: stefanpenner/resolution-test/L1-03@main
      - uses: stefanpenner/resolution-test/L1-04@main
      - uses: stefanpenner/resolution-test/L1-05@main
      - uses: stefanpenner/resolution-test/L1-06@main
      - uses: stefanpenner/resolution-test/L1-07@main
      - uses: stefanpenner/resolution-test/L1-08@main
      - uses: stefanpenner/resolution-test/L1-09@main
      - uses: stefanpenner/resolution-test/L1-10@main
      - uses: stefanpenner/resolution-test/leaf-01@main
      - uses: stefanpenner/resolution-test/leaf-02@main
      - uses: stefanpenner/resolution-test/leaf-03@main
      - uses: stefanpenner/resolution-test/leaf-04@main
      - uses: stefanpenner/resolution-test/leaf-05@main
      - run: echo "Done (PR runner - batched, ~4 resolve calls expected)"
        shell: bash
